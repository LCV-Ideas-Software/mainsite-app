name: Public Format
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  prettier-public:
    name: Check index.html formatting
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mainsite-worker/package-lock.json
            mainsite-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --ignore-scripts --no-audit --no-fund
      - name: Check public page formatting
        run: npm run format:public:check
      - name: Install worker dependencies
        working-directory: mainsite-worker
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund
      - name: Validate worker
        working-directory: mainsite-worker
        run: |
          npm audit --audit-level=high --registry=https://registry.npmjs.org/
          npm run lint
          npm run biome
          npm test
      - name: Install frontend dependencies
        working-directory: mainsite-frontend
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund
      - name: Validate frontend
        working-directory: mainsite-frontend
        run: |
          npm audit --audit-level=high --registry=https://registry.npmjs.org/
          npm run lint
          npm run biome
          npm test
          npm run build
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
